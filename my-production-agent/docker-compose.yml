version: '3.8'

services:
  agent:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - PORT=8000
      - AGENT_API_KEY=${AGENT_API_KEY:-secret-agent-key-123}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    restart: always

  # Redis for scaling (Optional in this lab, but good practice)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
